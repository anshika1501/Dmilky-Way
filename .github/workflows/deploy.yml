name: Deploy Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            set -e

            # Force load standard Ubuntu profile configurations
            source ~/.profile || true
            source ~/.bashrc || true

            # Load NVM and node binaries explicitly
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Additional fallback for global npm installations
            export PATH=$PATH:/usr/bin:/usr/local/bin:/snap/bin

            cd /home/anshu/Dmilky-Way

            echo "Pulling latest code"
            git fetch --all
            git reset --hard origin/main

            echo "Updating backend"
            cd backend
            [ ! -d ".venv" ] && python3 -m venv .venv
            ./.venv/bin/pip install -r requirements.txt
            ./.venv/bin/python manage.py migrate
            ./.venv/bin/python manage.py collectstatic --noinput

            echo "Updating frontend"
            cd ../frontend
            
            # Use explicit nvm run or fallback to system npm
            if [ -x "$(command -v npm)" ]; then
              npm install
              npm run build
            elif [ -s "$NVM_DIR/nvm.sh" ]; then
              # NVM exists, check for installed node
              INSTALLED_NODE=$(nvm ls --no-colors | grep -o 'v[0-9]*\.[0-9]*\.[0-9]*' | tail -1)
              if [ -z "$INSTALLED_NODE" ]; then
                echo "NVM found but no node versions installed. Installing node..."
                nvm install node
                nvm use node
              else
                nvm use "$INSTALLED_NODE"
              fi
              
              npm install
              npm run build
            else
              # Last resort fallback if NVM script is broken
              echo "Installing system node as fallback..."
              sudo apt-get update && sudo apt-get install -y nodejs npm
              npm install
              npm run build
            fi

            echo "Restarting services"
            export PATH=$PATH:~/.npm-global/bin:/usr/local/bin:/usr/bin
            pm2 restart django-backend
            pm2 restart milkman
            pm2 restart milkman-api
            # pm2 restart next-app  # Commented out as Next.js is not used with Vite+React setup